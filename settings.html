<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings | Authentic-Face</title>
    <link rel="stylesheet" href="dist/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/all.min.css">
 
</head>
<body>

<div class="settings-container">
    <div class="settings-header">
        <a href="active-user-profile.html" class="text-dark me-3 text-decoration-none"><i class="fa fa-chevron-left"></i></a>
        <h5 class="mb-0 fw-bold">Settings</h5>
    </div>

    <div class="section-box">
        <span class="section-label">Account Settings</span>
        
        <a href="#" class="settings-link">
            <span>Phone Number</span>
            <span class="val">+234 812 345 6789 <i class="fa fa-chevron-right ms-2"></i></span>
        </a>

        <a href="#" class="settings-link">
            <span>Email</span>
            <span class="val">wisdom@example.com <i class="fa fa-chevron-right ms-2"></i></span>
        </a>

        <a href="#" class="settings-link">
            <span>Verify Account</span>
            <span class="val text-primary">Get Started <i class="fa fa-chevron-right ms-2"></i></span>
        </a>
    </div>

    <div class="section-box">
        <span class="section-label">Notifications</span>
        
        <div class="settings-link">
            <span>New Matches</span>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" checked>
            </div>
        </div>

        <div class="settings-link">
            <span>Messages</span>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" checked>
            </div>
        </div>

        <div class="settings-link">
            <span>App Sounds</span>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox">
            </div>
        </div>
    </div>

    <div class="section-box">
        <span class="section-label">Legal</span>
        
        <a href="privacy.html" class="settings-link">
            <span>Privacy Policy</span>
            <i class="fa fa-chevron-right"></i>
        </a>

        <a href="terms.html" class="settings-link">
            <span>Terms of Service</span>
            <i class="fa fa-chevron-right"></i>
        </a>

        <a href="licences.html" class="settings-link">
            <span>Licenses</span>
            <i class="fa fa-chevron-right"></i>
        </a>

        <a href="support.html" class="settings-link">
            <span>Contact Support</span>
            <i class="fa fa-chevron-right"></i>
        </a>
    </div>

    <div class="danger-zone">
        <a href="login.html" class="btn-logout">Logout</a>
        <a href="index.html" class="brand-logo">
                <span class="logo-bold">AUTHENTIC</span><span class="logo-light">FACE</span>
            </a>
        <br>
        <a href="#" class="btn-delete">Delete Account</a>
        <p class="text-muted mt-3" style="font-size: 11px;">Version 1.0.26</p>
    </div>

</div>

</body>
<script src="dist/js/bootstrap.bundle.min.js"></script>
</html>
