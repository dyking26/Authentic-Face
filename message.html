<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messages | Authentic-Face</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/messaage.css">
    <link rel="stylesheet" href="css/global.css">
</head>

<body>

    <header class="messages-header sticky-top d-flex justify-content-between align-items-center px-3 py-3">
        <h4 class="fw-bold mb-0">Messages</h4>
        <a href="settings.html"><button class="btn btn-light rounded-circle"><i
                    class="fa-solid fa-sliders"></i></button></a>
    </header>

    <div class="search-container">
        <input type="text" class="form-control search-input" placeholder="Search 12 matches...">
    </div>

    <div class="section-title px-3 pt-2">
        <h6 class="text-uppercase text-muted small fw-bold">New Matches</h6>
    </div>
    <div class="matches-scroll">
        <div class="match-item">
            <div class="match-avatar-wrapper">
                <img src="img/profile girl 2.jpg" class="match-avatar" alt="User">
            </div>
            <span class="small fw-bold">Adannaya</span>
        </div>
        <div class="match-item">
            <div class="match-avatar-wrapper">
                <img src="img/profile girl 5.jpg" class="match-avatar" alt="User">
            </div>
            <span class="small fw-bold">Joy</span>
        </div>
    </div>

    <hr class="mx-3 my-2 text-muted opacity-25">

    <div class="chat-list pb-5 mb-5">
        <a href="chat.html" class="chat-item">
            <div class="position-relative">
                <img src="img/profile girl 1.jpg" class="chat-avatar-main" alt="Jenny">
                <span class="online-indicator"></span>
            </div>
            <div class="ms-3 flex-grow-1">
                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-bold">Jenny</h6>
                    <small class="text-muted">2m ago</small>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                    <p class="mb-0 msg-preview"><span class="text-danger fw-bold">New message ·</span> That sounds
                        amazing!</p>
                    <span class="unread-badge">1</span>
                </div>
            </div>
        </a>

        <a href="chat.html" class="chat-item">
            <div class="position-relative">
                <img src="img/profile girl 3.jpg" class="chat-avatar-main" alt="Loveth">
            </div>
            <div class="ms-3 flex-grow-1">
                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-bold">Loveth</h6>
                    <small class="text-muted">1h ago</small>
                </div>
                <p class="mb-0 msg-preview">How was your day dear?</p>
            </div>
            <a href="chat.html" class="chat-item">
                <div class="position-relative">
                    <img src="img/profile girl 6.jpg" class="chat-avatar-main" alt="Loveth">
                </div>
                <div class="ms-3 flex-grow-1">
                    <div class="d-flex justify-content-between align-items-center">
                        <h6 class="mb-0 fw-bold">jasmine</h6>
                        <small class="text-muted">1h ago</small>
                    </div>
                    <p class="mb-0 msg-preview">Hello!!!?</p>
                </div>
                <a href="chat.html" class="chat-item">
                    <div class="position-relative">
                        <img src="img/profile girl 8.jpg" class="chat-avatar-main" alt="Loveth">
                    </div>
                    <div class="ms-3 flex-grow-1">
                        <div class="d-flex justify-content-between align-items-center">
                            <h6 class="mb-0 fw-bold">Amaka</h6>
                            <small class="text-muted">1h ago</small>
                        </div>
                        <p class="mb-0 msg-preview">Hey, you good?</p>
                    </div>
                </a>
    </div>

    <div class="mobile-bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i class="fa fa-fire"></i>
            <span class="nav-label">Swipe</span>
        </a>

        <a href="nearby-grid.html" class="nav-item">
            <i class="fa fa-compass"></i>
            <span class="nav-label">Hookup</span>
        </a>

        <a href="likes.html" class="nav-item">
            <div class="icon-wrapper">
                <i class="fa fa-heart"></i>
                <span class="notification-badge">3</span>
            </div>
            <span class="nav-label-like">likes</span>
        </a>

        <a href="message.html" class="nav-item">
            <i class="fa fa-comment"></i>
            <span class="nav-label">Chat</span>
        </a>

        <a href="my-profile.html" class="nav-item">
            <i class="fa fa-user"></i>
            <span class="nav-label">Profile</span>
        </a>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
