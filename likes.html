<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Likes | Authentic-Face</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/likes.css">
    <style>

    </style>
</head>
<body>

    <header class="p-3 border-bottom sticky-top bg-white text-center">
        <h5 class="fw-bold mb-0">18 People Like You</h5>
    </header>

    <div class="container mt-3">
        <div class="row gx-3" id="likesGrid">
            </div>
    </div>

    <div class="paywall-float">
        <h6 class="fw-bold">Upgrade to Gold</h6>
        <p class="small text-muted">See who liked you and start chatting instantly!</p>
        <button class="btn btn-gold w-100">See All Likes</button>
    </div>

    <nav class="mobile-bottom-nav">
        <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-fire"></i></a>
        <a href="likes.html" class="nav-link active"><i class="fa-solid fa-heart"></i></a>
        <a href="message.html" class="nav-link"><i class="fa-solid fa-comment"></i></a>
        <a href="my-profile.html" class="nav-link"><i class="fa-solid fa-user"></i></a>
    </nav>

    <script>
        // Generate 20 fake "liked" users
        const grid = document.getElementById('likesGrid');
        for (let i = 1; i <= 20; i++) {
            grid.innerHTML += `
                <div class="col-6">
                    <div class="like-card">
                        <img src="https://i.pravatar.cc/300?u=${i}" class="blur-img">
                        <div class="lock-overlay">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
