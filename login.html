<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | Authentic-Face</title>
    <link rel="stylesheet" href="dist/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/global.css">

</head>
<body>

    <div class="login-card">
        <a href="index.html" class="brand-logo">
            <span class="logo-bold">AUTHENTIC</span><span class="logo-light">FACE</span>
        </a>

        <h4 class="fw-bold mb-4">Welcome Back</h4>

        <form action="dashboard.html">
            <input type="email" class="form-control" placeholder="Email Address" required>
            <input type="password" class="form-control" placeholder="Password" required>
            
            <button type="submit" class="btn-login shadow-sm">Log In</button>
            
            <a href="#" class="forgot-pass">Forgot password?</a>
        </form>

        <div class="social-login">
            <button class="btn-social">
                <i class="fab fa-google text-danger"></i> Continue with Google
            </button>
            <button class="btn-social">
                <i class="fab fa-facebook text-primary"></i> Continue with Facebook
            </button>
        </div>

        <p class="mt-4 mb-0 text-muted">
            New here? <a href="signup.html" class="text-danger fw-bold text-decoration-none">Create Account</a>
        </p>
    </div>

</body>
<script src="dist/js/bootstrap.bundle.min.js"></script>
</html>
