<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | Authentic-Face</title>
    <link rel="stylesheet" href="dist/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/support.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/all.min.css">
 
</head>
<body>

    <header class="support-header">
        <div class="container">
            <h1 class="fw-bold">How can we help?</h1>
            <p class="opacity-75">Our team typically responds within 24 hours.</p>
        </div>
    </header>

    <div class="container">
        <div class="row g-4 mb-5 pb-5 pt-5 justify-content-center">
            <div class="col-md-3">
                <div class="help-card">
                    <i class="fa-solid fa-user-shield"></i>
                    <h6>Safety & Reporting</h6>
                </div>
            </div>
            <div class="col-md-3">
                <div class="help-card">
                    <i class="fa-solid fa-credit-card"></i>
                    <h6>Billing & Premium</h6>
                </div>
            </div>
            <div class="col-md-3">
                <div class="help-card">
                    <i class="fa-solid fa-bug"></i>
                    <h6>Technical Issue</h6>
                </div>
            </div>
        </div>

        <div class="contact-container">
            <form>
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Your Name</label>
                        <input type="text" class="form-control" placeholder="Wisdom" required>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="name@example.com" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Topic</label>
                    <select class="form-select">
                        <option selected>Select a category</option>
                        <option value="1">Account Access</option>
                        <option value="2">Safety Concern</option>
                        <option value="3">Feature Suggestion</option>
                        <option value="4">Other</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">Subject</label>
                    <input type="text" class="form-control" placeholder="Briefly describe the issue">
                </div>

                <div class="mb-4">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" rows="5" placeholder="How can we help you today?"></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label">Attachments (Optional)</label>
                    <input type="file" class="form-control">
                    <small class="text-muted">Screenshots help us solve issues faster.</small>
                </div>

                <button type="button" class="btn-submit" onclick="alert('Message Sent! Our team will contact you soon.')">
                    <i class="fa-solid fa-paper-plane me-2"></i> Send Message
                </button>
            </form>
        </div>
    </div>

    <footer class="text-center py-5">
        <a href="dashboard.html" class="text-decoration-none text-danger fw-bold"><i class="fa fa-arrow-left me-2"></i>Back to Dashboard</a>
    </footer>

</body>
<script src="dist/js/bootstrap.bundle.min.js"></script>
</html>
