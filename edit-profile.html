<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edit Profile | Authentic-Face</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/edit-profile.css">
    <link rel="stylesheet" href="css/global.css">

</head>

<body>

    <header class="edit-header">
        <a href="my-profile.html" class="text-dark fs-5"><i class="fa fa-chevron-left"></i></a>
        <h6 class="m-0 fw-bold">Edit Profile</h6>
        <a href="my-profile.html"><button class="save-btn" onclick="saveProfile()">Done</button></a>
    </header>

    <div class="container px-3">

        <div class="section-card">
            <h6 class="section-title">About Me</h6>
            <textarea class="form-control border-0 p-0" rows="3" placeholder="Tell your story..." maxlength="200"
                id="bioInput">Love coffee, hiking, and designing things that actually work.</textarea>
            <div class="text-end mt-2">
                <small class="text-muted" id="charCount">0/200</small>
            </div>
        </div>

        <div class="section-card">
            <h6 class="section-title">Professional Info</h6>
            <div class="mb-3">
                <label class="small text-muted">Job Title</label>
                <input type="text" class="form-control form-control-custom" value="Creative Designer">
            </div>
            <div>
                <label class="small text-muted">Company</label>
                <input type="text" class="form-control form-control-custom" placeholder="Add Company">
            </div>
            <div>
                <label class="small text-muted">Education</label>
                <input type="text" class="form-control form-control-custom" placeholder="Add School">
            </div>
        </div>

        <div class="section-card">
            <h6 class="section-title">Interests</h6>
            <div class="d-flex flex-wrap">
                <span class="interest-tag active">Photography</span>
                <span class="interest-tag active">Coffee</span>
                <span class="interest-tag">Hiking</span>
                <span class="interest-tag">Tech</span>
                <span class="interest-tag">Cooking</span>
                <span class="interest-tag">Gamming</span>
                <span class="interest-tag">Reading</span>
                <span class="interest-tag">Swimming</span>
                <span class="interest-tag">Food</span>
                <span class="interest-tag">Painting</span>
                <span class="interest-tag">Dates</span>
                <span class="interest-tag">Travel</span>
                <span class="interest-tag">Travel</span>
                <span class="interest-tag">Travel</span>
                <span class="interest-tag">Travel</span>
                <span class="interest-tag">Travel</span>
                <span class="interest-tag"><i class="fa fa-plus me-1"></i> Add</span>
            </div>
        </div>

    </div>

   <div class="mobile-bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i class="fa fa-fire"></i>
            <span class="nav-label">Swipe</span>
        </a>

        <a href="nearby-grid.html" class="nav-item">
            <i class="fa fa-compass"></i>
            <span class="nav-label">Hookup</span>
        </a>

        <a href="likes.html" class="nav-item">
            <div class="icon-wrapper">
                <i class="fa fa-heart"></i>
                <span class="notification-badge">3</span>
            </div>
            <span class="nav-label-like">likes</span>
        </a>

        <a href="message.html" class="nav-item">
            <i class="fa fa-comment"></i>
            <span class="nav-label">Chat</span>
        </a>

        <a href="my-profile.html" class="nav-item">
            <i class="fa fa-user"></i>
            <span class="nav-label">Profile</span>
        </a>

    <script>
        // Character counter logic
        const bio = document.getElementById('bioInput');
        const count = document.getElementById('charCount');

        bio.addEventListener('input', () => {
            count.innerText = `${bio.value.length}/200`;
        });

        function saveProfile() {
            // Add a little haptic-style feedback
            alert("Profile Updated Successfully!");
            window.location.href = 'profile.html';
        }

        // Toggle tags
        document.querySelectorAll('.interest-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                tag.classList.toggle('active');
            });
        });
    </script>

</body>

</html>
