<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>It's a Match! | Authentic-Face</title>
    <link rel="stylesheet" href="dist/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/match-overlay.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/all.min.css">

</head>
<body>

    <div class="match-overlay">
        <div class="match-content">
            <h1 class="match-title">It's a Match!</h1>
            
            <p class="mb-5 opacity-75">You and Olivia have both liked each other.</p>

            <div class="photo-container">
                <img src="img/dyking snow.jpeg" class="match-photo photo-left" alt="Me">
                
                <div class="heart-icon-center">
                    <i class="fa fa-heart"></i>
                </div>

                <img src="img/profile 1b.jpg" class="match-photo photo-right" alt="Olivia">
            </div>

            <div class="px-4">
                <button class="btn-message shadow" onclick="window.location.href='message.html'">
                    Send a Message
                </button>
                <button class="btn-keep-swiping" onclick="window.location.href='dashboard.html'">
                    Keep Swiping
                </button>
            </div>
        </div>
    </div>

</body>
<script src="dist/js/bootstrap.bundle.min.js"></script>
</html>
