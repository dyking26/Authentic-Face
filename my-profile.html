<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Authentic-Face</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/my-profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
    
 
</head>
<body>

    <div class="profile-header">
        <a href="discovery-settings.html" class="settings-btn"><i class="fa fa-cog"></i></a>
    </div>

    <div class="text-center avatar-section">
        <div class="d-inline-block position-relative">
            <img src="img/dyking snow.jpeg" class="profile-pic" alt="Profile">
            <div class="badge-verified shadow">
                <i class="fa fa-check"></i>
            </div>
        </div>
        <h3 class="fw-bold mt-3 mb-0">Dyking, 28</h3>
        <p class="text-muted"><i class="fa fa-briefcase me-1"></i> Chemical Engineer</p>
    </div>

    <div class="container">
        <div class="stats-card row mx-1 text-center">
            <div class="col-4 border-end">
                <span class="stat-val">24</span>
                <span class="stat-label">Matches</span>
            </div>
            <div class="col-4 border-end">
                <span class="stat-val">1.2k</span>
                <span class="stat-label">Views</span>
            </div>
            <div class="col-4">
                <span class="stat-val">98%</span>
                <span class="stat-label">Authentic</span>
            </div>
        </div>

        <div class="bio-section mx-1 shadow-sm">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 class="fw-bold m-0">About Me</h6>
               <a href="edit-profile.html"><button class="btn btn-sm text-primary p-0">Edit Profile</button></a>
            </div>
            <p class="text-muted small mb-0">Love coffee, hiking, and designing things that actually work. Looking for someone who is as "Authentic" as their profile photo! ☕✨</p>
        </div>

        <div class="photo-grid px-1">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="fw-bold m-0">My Gallery</h6>
                <span class="badge bg-light text-dark">4 / 9</span>
            </div>
            <div class="row g-2">
                <div class="col-4"><div class="photo-slot"><img src="img/dyking snow.jpeg"></div></div>
                <div class="col-4"><div class="photo-slot"><img src="img/dyking black and white.png"></div></div>
                <div class="col-4"><div class="photo-slot"><img src="img/dyking wizzy.jpeg"></div></div>
                <div class="col-4"><div class="photo-slot"><img src="img/profile 1a.jpg"></div></div>
                <div class="col-4"><div class="photo-slot add-photo"><i class="fa fa-plus fs-4"></i></div></div>
                <div class="col-4"><div class="photo-slot add-photo"><i class="fa fa-plus fs-4"></i></div></div>
            </div>
        </div>
    </div>

    <div class="mobile-bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i class="fa fa-fire"></i>
            <span class="nav-label">Swipe</span>
        </a>

        <a href="nearby-grid.html" class="nav-item">
            <i class="fa fa-compass"></i>
            <span class="nav-label">Hookup</span>
        </a>

        <a href="likes.html" class="nav-item">
            <div class="icon-wrapper">
                <i class="fa fa-heart"></i>
                <span class="notification-badge">3</span>
            </div>
            <span class="nav-label-like">likes</span>
        </a>

        <a href="message.html" class="nav-item">
            <i class="fa fa-comment"></i>
            <span class="nav-label">Chat</span>
        </a>

        <a href="my-profile.html" class="nav-item">
            <i class="fa fa-user"></i>
            <span class="nav-label">Profile</span>
        </a>

</body>
</html>
