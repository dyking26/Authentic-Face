<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat with Jenny | Authentic-Face</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/chat.css">
</head>

<body>
    <header class="chat-header">
        <a href="messages.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <img src="img/profile girl 1.jpg" class="chat-user-img" alt="Jenny">
        <div class="flex-grow-1">
            <h6 class="mb-0 fw-bold">Jenny</h6>
            <span class="user-status"><i class="fa-solid fa-circle" style="font-size: 8px;"></i> Online</span>
        </div>
        <div class="call">
            <button class="btn btn-link text-dark p-0"><i class="fa-solid fa-phone"></i></button>
            <button class="btn btn-link text-dark p-0"><i class="fa-solid fa-video"></i></button>
            <button onclick="openReport()" style="background:none; border:none; cursor:pointer;">
                <i class="fa-solid fa-ellipsis-vertical text-muted"></i>
            </button>
        </div>
    </header>

    <main class="chat-container" id="chatContainer">
        <div class="message received">
            Hey Wisdom! I saw your profile and loved your photography shots. 📸
            <span class="msg-time text-end">10:15 AM</span>
        </div>

        <div class="message sent">
            Thanks Jenny! That means a lot. I noticed you're into tennis—do you play often?
            <span class="msg-time">10:17 AM</span>
        </div>

        <div class="message received">
            Yes! I play every weekend at the club. We should hit some balls sometime.
            <span class="msg-time text-end">10:20 AM</span>
        </div>

    </main>

    <div id="reportDrawer" class="report-overlay" onclick="closeReport()">
        <div class="report-content" onclick="event.stopPropagation()">
            <div class="drawer-line"></div>
            <h6 class="fw-bold text-center mb-4">Chat Settings</h6>

            <div class="list-group list-group-flush">
                <button class="list-group-item list-group-item-action border-0 py-3" onclick="alert('Unmatched!')">
                    <i class="fa-solid fa-heart-crack me-2 text-muted"></i> Unmatch Olivia
                </button>
                <button class="list-group-item list-group-item-action border-0 py-3 text-danger"
                    onclick="alert('Reported!')">
                    <i class="fa-solid fa-flag me-2"></i> Report & Block
                </button>
            </div>

            <button class="btn btn-light w-100 mt-3 rounded-pill" onclick="closeReport()">Cancel</button>
        </div>
    </div>

    <footer class="chat-input-area">
        <div class="input-wrapper">
            <button class="action-btn plus-btn"><i class="fa-solid fa-plus"></i></button>
            <input type="text" class="chat-input" placeholder="Type a message..." id="messageInput">
            <button class="action-btn" id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </footer>

    <script>

        function openReport() {
            // Find the drawer by its ID and make it flex (visible)
            document.getElementById('reportDrawer').style.display = 'flex';
        }

        function closeReport() {
            // Find the drawer and hide it again
            document.getElementById('reportDrawer').style.display = 'none';
        }
        // Auto-scroll to bottom on load
        const container = document.getElementById('chatContainer');
        container.scrollTop = container.scrollHeight;

        // Optional: Simple Send Logic
        const sendBtn = document.getElementById('sendBtn');
        const input = document.getElementById('messageInput');

        sendBtn.addEventListener('click', () => {
            if (input.value.trim() !== "") {
                const newMsg = document.createElement('div');
                newMsg.className = 'message sent';
                newMsg.innerHTML = `${input.value}<span class="msg-time">Just now</span>`;
                container.appendChild(newMsg);
                input.value = "";
                container.scrollTop = container.scrollHeight;
            }
        });
    </script>

</body>

</html>
